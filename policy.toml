# Agent Harness ポリシー設定
# ホストモードではファイル保存で即反映（ホットリロード）
# コンテナモードではDocker bind mountのmtime伝播遅延があるため docker compose restart proxy が必要

[general]
# SQLiteログの保存先（コンテナ内パス）
log_db = "/data/harness.db"
# tool_usesテーブルに保存するinputの最大文字数（0=無制限）
max_tool_input_store = 1000
# ログの自動ローテーション日数（0=無制限、起動時に古いレコードを削除）
log_retention_days = 30

[domains.allow]
# 通信を許可するドメイン。ここにないドメインは全てブロックされる
# ワイルドカード対応: "*.example.com" は example.com 自体とサブドメインの両方にマッチ
# Anthropic公式の必須ドメイン（https://code.claude.com/docs/en/claude-code-on-the-web）
# api.anthropic.com: API通信
# statsig.anthropic.com: フィーチャーフラグ
# platform.claude.com: OAuth認証
# code.claude.com: Claude Code Web
# claude.ai: Claude Web
list = ["api.anthropic.com", "statsig.anthropic.com", "platform.claude.com", "code.claude.com", "claude.ai", "mcp-proxy.anthropic.com"]

[domains.deny]
# 明示的に拒否するドメイン。allow より優先される
list = ["*.evil.com"]

[domains.dismissed]
# ダッシュボードで「無視」したドメイン。ホワイトリスト育成の候補から除外される
# "registry.npmjs.org" = { reason = "ホスト側でnpm install済み", date = "2026-03-29" }
"http-intake.logs.us5.datadoghq.com" = { reason = "Datadogテレメトリ。エージェント動作に不要", date = "2026-03-31" }

[paths.allow]
# ドメインがdomains.allowになくても、特定パスは許可
"raw.githubusercontent.com" = ["/anthropics/*"]
"registry.npmjs.org" = ["/@anthropic-ai/*", "/@playwright/*", "/npm", "/playwright", "/playwright/*", "/playwright-core", "/playwright-core/*"]
"downloads.claude.ai" = ["/claude-code-releases/*"]
"github.com" = ["/anthropics/*"]

[paths.deny]
# ドメインがdomains.allowにあっても、特定パスはブロック
# "api.anthropic.com" = ["/v1/files*"]

[rate_limits]
# ドメイン別のレート制限。rpm=1分あたりの上限、burst=1秒あたりの上限
# 超過時は 429 Retry-After レスポンスを返す
"api.anthropic.com" = { rpm = 120, burst = 50 }

[payload_rules]
# エージェント → Anthropic API へのリクエスト本文を検査する
# 会話履歴にはエージェントが読んだファイル内容やコマンド出力が含まれるため、
# ここで機密情報がAnthropicに送信されるのを防止する

# リクエスト本文内の危険パターン（正規表現）
# ※実行コマンドのブロックは [tool_use_rules] で行う
block_patterns = []

# 機密情報の流出を検知するパターン（正規表現、大文字小文字を区別しない）
# エージェントが.env等を読んだ結果がAnthropicに送信されるのを防ぐ
secret_patterns = [
    "AWS_SECRET_ACCESS_KEY",
    "ANTHROPIC_API_KEY",
    "-----BEGIN.*PRIVATE KEY-----",
]

[tool_use_rules]
# Anthropic API → エージェントへのレスポンス内のtool_useを検査する
# 危険なtool実行をSSEストリーム切断で阻止する（方式B: 事後キル）

# 完全にブロックするツール名
block_tools = []

# 引数にこの文字列が含まれたらブロック（実行コマンド・パスのパターン）
block_args = [
    "rm -rf /",
    "chmod 777",
    "printenv",
    "/proc/",
    "/etc/shadow",
    "/etc/passwd",
]

[alerts]
# tool_use検出時にアラートを生成する条件（それぞれ独立、ログのみでブロックはしない）

# 特定ツールの全使用をログしたい場合に指定（デバッグ用途向け）
# Bash等を入れるとノイズになるため、通常は空でよい
suspicious_tools = []

# 引数にこの文字列が含まれたらアラート（どのツールでも発火）
# 機密ファイルへのアクセス検知に有効
suspicious_args = ["~/.ssh", "~/.aws", ".env", "id_rsa"]

# 引数がこのバイト数を超えたらアラート（大量データ流出の兆候検知）
tool_arg_size_alert = 10000

# 組み合わせ条件（各ルール内はAND、ルール間はOR）
# tools: ツール名のいずれかにマッチ（省略=全ツール対象）
# args: 引数パターンのいずれかにワード境界マッチ（省略=引数条件なし）
# min_size: 引数サイズ閾値（省略=サイズ条件なし）

[[alerts.rules]]
name = "Bash accessing secrets"
tools = ["Bash"]
args = ["~/.ssh", "~/.aws", ".env"]

[[alerts.rules]]
name = "Large file operation"
tools = ["Write", "Edit"]
min_size = 50000
