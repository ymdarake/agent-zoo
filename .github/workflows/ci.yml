name: CI

# paths-ignore は root 直下の .md を whitelist 列挙（'**.md' 禁止：
# bundle/templates/HARNESS_RULES.md など code-adjacent な .md は CI 対象に含める）。
# 新規 root .md (SECURITY.md / CONTRIBUTING.md 等) を追加した際は必要に応じて追記。
on:
  pull_request:
    paths-ignore:
      - 'README*.md'
      - 'CHANGELOG.md'
      - 'BACKLOG.md'
      - 'CLAUDE.md'
      - 'docs/**'
      - 'LICENSE'
      - 'logo.svg'
  push:
    branches: [main]
    paths-ignore:
      - 'README*.md'
      - 'CHANGELOG.md'
      - 'BACKLOG.md'
      - 'CLAUDE.md'
      - 'docs/**'
      - 'LICENSE'
      - 'logo.svg'
  workflow_dispatch: {}

# 同 ref で更新が来たら旧 run を cancel
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-py-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py-${{ matrix.python-version }}-

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run unit tests
        run: uv run python -m pytest tests/ -v

  # Sprint 006 PR E (self-review H3): pip-audit を unit matrix から切り出して
  # Python 3 versions x 2 audit = 6 重実行を排除。lock file は Python version
  # に依存せずに audit できる。
  # --vulnerability-service osv で OSV.dev (GitHub Advisory Database 含む) を
  # 参照、PyPI 公式 advisory を包含して広いカバレッジ。
  # uv tool run で別 venv install し tool.uv.exclude-newer の影響を回避。
  pip-audit:
    name: Audit Python dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Audit project dependencies
        run: uv tool run pip-audit --vulnerability-service osv

      - name: Audit dashboard requirements.txt
        run: uv tool run pip-audit -r bundle/dashboard/requirements.txt --vulnerability-service osv

  # Sprint 006 PR E: docker-compose.yml の image: 行 SHA pin が registry で
  # 解決できることを PR 段階で fail-fast 検証する。Docker daemon は不要だが
  # registry への network 通信が発生する (digest 解決のため)。
  compose-config:
    name: Verify docker-compose digest pins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Verify docker-compose config resolves
        working-directory: bundle
        run: docker compose config --resolve-image-digests > /dev/null

  e2e-dashboard:
    name: E2E P1 dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-e2e-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-e2e-

      - name: Install dependencies
        run: uv sync --extra dev --extra e2e

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .venv/playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: make e2e-install

      - name: Install Playwright system deps
        run: uv run playwright install-deps chromium

      - name: Run E2E P1 (dashboard)
        run: make e2e

  e2e-proxy:
    name: E2E P2 proxy (post-merge)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-e2e-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-e2e-

      - name: Install dependencies
        run: uv sync --extra dev --extra e2e

      - name: Prepare runtime policy (bind-mount target)
        run: touch bundle/policy.runtime.toml

      - name: Build base image
        run: docker build -t agent-zoo-base:latest -f bundle/container/Dockerfile.base bundle/

      - name: Build claude image
        working-directory: bundle
        env:
          HOST_UID: "1001"
        run: docker compose build claude

      - name: Run E2E P2 (proxy)
        env:
          HOST_UID: "1001"
        run: uv run pytest tests/e2e/test_proxy_block.py -v
