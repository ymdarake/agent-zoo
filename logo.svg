<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" fill="none">
  <rect width="560" height="200" rx="16" fill="#1a1b26"/>

  <!-- ========== LEFT: Cage with Hamster ========== -->

  <!-- Cage structure -->
  <rect x="24" y="40" width="100" height="110" rx="6" fill="none" stroke="#565f89" stroke-width="2.5" opacity="0.5"/>
  <line x1="44" y1="40" x2="44" y2="150" stroke="#565f89" stroke-width="2" opacity="0.4"/>
  <line x1="64" y1="40" x2="64" y2="150" stroke="#565f89" stroke-width="2" opacity="0.4"/>
  <line x1="84" y1="40" x2="84" y2="150" stroke="#565f89" stroke-width="2" opacity="0.4"/>
  <line x1="104" y1="40" x2="104" y2="150" stroke="#565f89" stroke-width="2" opacity="0.4"/>

  <!-- Hamster body -->
  <ellipse cx="74" cy="112" rx="22" ry="20" fill="#e0af68"/>
  <ellipse cx="74" cy="117" rx="14" ry="12" fill="#fcebd2"/>
  <!-- Head -->
  <circle cx="74" cy="84" r="18" fill="#e0af68"/>
  <!-- Ears -->
  <ellipse cx="60" cy="70" rx="7" ry="9" fill="#e0af68"/>
  <ellipse cx="60" cy="70" rx="4.5" ry="6" fill="#f5c89a"/>
  <ellipse cx="88" cy="70" rx="7" ry="9" fill="#e0af68"/>
  <ellipse cx="88" cy="70" rx="4.5" ry="6" fill="#f5c89a"/>
  <!-- Eyes -->
  <circle cx="67" cy="82" r="3.5" fill="#1a1b26"/>
  <circle cx="81" cy="82" r="3.5" fill="#1a1b26"/>
  <circle cx="68.2" cy="80.8" r="1.3" fill="white"/>
  <circle cx="82.2" cy="80.8" r="1.3" fill="white"/>
  <!-- Nose + mouth -->
  <ellipse cx="74" cy="89" rx="2.5" ry="1.8" fill="#c0846b"/>
  <path d="M71.5 91 Q74 94 76.5 91" fill="none" stroke="#c0846b" stroke-width="0.8"/>
  <!-- Cheeks -->
  <circle cx="61" cy="88" r="4.5" fill="#f7768e" opacity="0.25"/>
  <circle cx="87" cy="88" r="4.5" fill="#f7768e" opacity="0.25"/>
  <!-- Paws on bars -->
  <ellipse cx="64" cy="102" rx="5" ry="3.5" fill="#e0af68"/>
  <ellipse cx="84" cy="102" rx="5" ry="3.5" fill="#e0af68"/>
  <!-- Tail -->
  <circle cx="96" cy="118" r="3.5" fill="#e0af68"/>

  <!-- ========== Network lines: cage → proxy ========== -->
  <line x1="124" y1="78" x2="162" y2="78" stroke="#9ece6a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="160,75 167,78 160,81" fill="#9ece6a" opacity="0.5"/>
  <line x1="124" y1="95" x2="162" y2="95" stroke="#9ece6a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="160,92 167,95 160,98" fill="#9ece6a" opacity="0.5"/>
  <line x1="124" y1="112" x2="155" y2="112" stroke="#f7768e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="153" y1="108" x2="161" y2="116" stroke="#f7768e" stroke-width="2" opacity="0.7"/>
  <line x1="161" y1="108" x2="153" y2="116" stroke="#f7768e" stroke-width="2" opacity="0.7"/>

  <!-- ========== MIDDLE: Proxy Shield ========== -->

  <path d="M178 50 L200 40 L222 50 L222 115 C222 132 200 148 200 148 C200 148 178 132 178 115 Z"
        fill="#7aa2f7" opacity="0.1" stroke="#7aa2f7" stroke-width="2"/>

  <!-- Magnifying glass -->
  <circle cx="200" cy="80" r="16" fill="none" stroke="#c0caf5" stroke-width="2"/>
  <line x1="212" y1="92" x2="222" y2="102" stroke="#c0caf5" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Eye inside magnifier -->
  <ellipse cx="200" cy="80" rx="8" ry="5.5" fill="none" stroke="#7aa2f7" stroke-width="1.5"/>
  <circle cx="200" cy="80" r="3" fill="#7aa2f7"/>

  <!-- Checkmark -->
  <path d="M192 120 L197 126 L208 114" fill="none" stroke="#9ece6a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ========== Network lines: proxy → cloud ========== -->
  <line x1="222" y1="78" x2="255" y2="78" stroke="#9ece6a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="253,75 260,78 253,81" fill="#9ece6a" opacity="0.5"/>
  <line x1="222" y1="95" x2="255" y2="95" stroke="#9ece6a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="253,92 260,95 253,98" fill="#9ece6a" opacity="0.5"/>

  <!-- ========== Cloud ========== -->
  <ellipse cx="288" cy="82" rx="30" ry="20" fill="#414868" opacity="0.4"/>
  <ellipse cx="276" cy="76" rx="18" ry="14" fill="#414868" opacity="0.4"/>
  <ellipse cx="302" cy="74" rx="16" ry="13" fill="#414868" opacity="0.4"/>
  <ellipse cx="288" cy="68" rx="12" ry="10" fill="#414868" opacity="0.4"/>

  <!-- ========== Log flow line: proxy → dashboard ========== -->
  <path d="M210 148 C230 175 370 175 390 148" fill="none" stroke="#e0af68" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.4"/>
  <polygon points="388,150 393,144 384,145" fill="#e0af68" opacity="0.4"/>

  <!-- ========== RIGHT TOP: Dashboard Monitor ========== -->

  <rect x="360" y="40" width="130" height="82" rx="6" fill="#24283b" stroke="#565f89" stroke-width="1.5"/>
  <!-- Stand -->
  <rect x="410" y="122" width="30" height="7" rx="2" fill="#565f89" opacity="0.4"/>
  <rect x="400" y="129" width="50" height="4" rx="2" fill="#565f89" opacity="0.3"/>

  <!-- Screen header dots -->
  <circle cx="373" cy="50" r="3" fill="#f7768e" opacity="0.7"/>
  <circle cx="383" cy="50" r="3" fill="#e0af68" opacity="0.7"/>
  <circle cx="393" cy="50" r="3" fill="#9ece6a" opacity="0.7"/>

  <!-- Mini chart bars -->
  <rect x="372" y="76" width="9" height="32" rx="2" fill="#9ece6a" opacity="0.5"/>
  <rect x="385" y="66" width="9" height="42" rx="2" fill="#9ece6a" opacity="0.5"/>
  <rect x="398" y="82" width="9" height="26" rx="2" fill="#9ece6a" opacity="0.5"/>
  <rect x="411" y="88" width="9" height="20" rx="2" fill="#f7768e" opacity="0.5"/>
  <rect x="424" y="72" width="9" height="36" rx="2" fill="#9ece6a" opacity="0.5"/>
  <rect x="437" y="92" width="9" height="16" rx="2" fill="#f7768e" opacity="0.5"/>
  <rect x="450" y="78" width="9" height="30" rx="2" fill="#9ece6a" opacity="0.5"/>
  <rect x="463" y="84" width="9" height="24" rx="2" fill="#e0af68" opacity="0.5"/>
  <rect x="476" y="96" width="9" height="12" rx="2" fill="#f7768e" opacity="0.5"/>

  <!-- Alert badge -->
  <circle cx="484" cy="46" r="9" fill="#f7768e"/>
  <text x="481" y="50" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">!</text>

  <!-- ========== Title: Agent Zoo ========== -->
  <text x="335" y="178" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="48" font-weight="900" letter-spacing="-1">
    <tspan fill="#c0caf5">Agent</tspan><tspan fill="#7aa2f7"> Zoo</tspan>
  </text>
</svg>
