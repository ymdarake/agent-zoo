name: Release to PyPI

on:
  push:
    tags:
      # PEP 440 native public version (issue #68):
      #   - stable:       v0.1.0
      #   - pre-release:  v0.1.0a1 / v0.1.0b1 / v0.1.0rc1
      # 非 anchor glob なので `v*.*.*` で両方捕捉できる。分岐は build job の
      # Classify step (regex strict 判定) に寄せる。
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target (prd PyPI は tag push 専用)"
        type: choice
        options:
          - none
          - testpypi
        default: testpypi

# 同一タグ / 同一ブランチで重複実行を防ぐ。走行中の release を途中キャンセルしない。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      # issue #68: pre-release 判定を job output で一元管理。下流 job が
      # needs.build.outputs.is_prerelease で参照する。classify step が skip
      # された場合 (workflow_dispatch) は empty string になり、== 'true' /
      # == 'false' の literal 比較で安全に false 判定される。
      is_prerelease: ${{ steps.classify.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # issue #68: tag と pyproject.toml の version が一致することを保証する。
      # bit-for-bit 比較 (`removeprefix("v") == pyproject.version`)。
      # packaging.version.Version の正規化は意図的に使わず、非 PEP 440 native な
      # tag (`v0.1.0-beta-1` 等) を silent に通さないことで事故を防ぐ。
      - name: Verify tag matches pyproject.toml version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python <<'PY'
          import os
          import pathlib
          import sys
          import tomllib

          # runner の system python が 3.11+ であることを明示 guard
          # (tomllib stdlib 導入は 3.11)。uv python install 3.12 は PATH 上の
          # `python` を必ずしも shim しないため、fail-fast。
          assert sys.version_info >= (3, 11), (
              f"Python 3.11+ required (tomllib), got {sys.version}"
          )

          ref = os.environ["GITHUB_REF_NAME"]
          if not ref.startswith("v"):
              print(
                  f"::error::tag {ref!r} must start with 'v' (e.g. v0.1.0)",
                  file=sys.stderr,
              )
              sys.exit(1)
          tag_version = ref.removeprefix("v")
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          project = data.get("project", {})
          # dynamic version (hatch-vcs 等) は未対応。cryptic な KeyError で
          # 落ちる前に明示 error で案内する。
          if "version" not in project:
              print(
                  "::error::pyproject.toml has no static project.version. "
                  "Dynamic version (`dynamic = [\"version\"]`) is not "
                  "supported by this workflow; use a static version string "
                  "that matches the tag.",
                  file=sys.stderr,
              )
              sys.exit(1)
          pyproject_version = project["version"]
          if tag_version != pyproject_version:
              print(
                  f"::error::tag {ref!r} (stripped={tag_version!r}) != "
                  f"pyproject.toml project.version {pyproject_version!r}. "
                  f"Bump pyproject.toml to match the tag before tagging.",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"tag and pyproject version match: {tag_version}")
          PY

      # issue #68: PEP 440 native public version のみ accept。
      # 判定 regex (leading zero も reject、PyPI 正規化衝突を防ぐ):
      #   stable:       ^v\d+\.\d+\.\d+$
      #   pre-release:  ^v\d+\.\d+\.\d+(a|b|rc)(0|[1-9]\d*)$
      # 例: `v0.1.0b01` は accept 後 PyPI 側で `0.1.0b1` に正規化され、
      # 後続の `v0.1.0b1` push が 400 (already exists) で弾かれる事故を
      # regex 側で未然に防ぐ。
      # dash 形 (`v0.1.0-beta-1`) / dot 形 (`v0.1.0.post1` / `v0.1.0.dev1` /
      # `v0.1.0-rc.1`) / `vv0.1.0` / `v0.1.0post1` / `v0.1.0dev1` 等も
      # exit 1 で明示的に reject し、silent に is_prerelease=false →
      # 本番 PyPI に流れる事故を防ぐ。
      - name: Classify tag as pre-release
        id: classify
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python <<'PY'
          import os
          import re
          import sys

          ref = os.environ["GITHUB_REF_NAME"]
          stable_re = re.compile(r"^v\d+\.\d+\.\d+$")
          # (0|[1-9]\d*) で leading zero (例: `01`) を reject。
          prerelease_re = re.compile(r"^v\d+\.\d+\.\d+(a|b|rc)(0|[1-9]\d*)$")
          if stable_re.match(ref):
              is_prerelease = "false"
          elif prerelease_re.match(ref):
              is_prerelease = "true"
          else:
              print(
                  f"::error::tag {ref!r} is not a PEP 440 native public "
                  f"version. Expected v<X>.<Y>.<Z> or "
                  f"v<X>.<Y>.<Z>(a|b|rc)<N> with no leading zeros.",
                  file=sys.stderr,
              )
              sys.exit(1)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"is_prerelease={is_prerelease}\n")
          print(f"tag={ref} is_prerelease={is_prerelease}")
          PY

      - name: Build
        run: uv build

      - name: Verify wheel contents
        run: |
          whl=$(ls -1 dist/*.whl | head -n 1)
          python -m zipfile -l "$whl" | grep zoo/_assets || \
            (echo "Assets missing from wheel!" && exit 1)

      - name: Extract version
        id: version
        run: |
          python -c '
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          print("version=" + data["project"]["version"])
          ' >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    # issue #68: 従来の workflow_dispatch 経路を維持しつつ、pre-release tag
    # push で自動発火させる。is_prerelease は build job の classify step
    # output (literal 'true' / 'false' / empty)。
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && needs.build.outputs.is_prerelease == 'true')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/agent-zoo
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    # 本番 PyPI は stable tag push (`v*.*.*` で suffix 無し) でのみ発火。
    # issue #68: pre-release tag を絶対に通さないよう is_prerelease == 'false'
    # を明示。workflow_dispatch からの本番公開は従来通り塞いでいる。
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/') &&
      needs.build.outputs.is_prerelease == 'false'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agent-zoo
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

  github-release:
    name: Create GitHub Release
    # issue #68 belt-and-suspenders: needs: publish-pypi の skip 伝播
    # (success() が skip でも true を返す仕様) に依存せず、is_prerelease ==
    # 'false' を明示。needs に build を追加して outputs を直接参照する
    # (transitive needs では outputs は見えないため)。
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/') &&
      needs.build.outputs.is_prerelease == 'false'
    needs: [publish-pypi, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
