<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Background -->
  <rect width="400" height="120" rx="12" fill="#1a1b26"/>

  <!-- Shield (security) -->
  <path d="M40 25 L70 15 L100 25 L100 65 C100 80 70 95 70 95 C70 95 40 80 40 65 Z"
        fill="none" stroke="#7aa2f7" stroke-width="2.5"/>

  <!-- Lock inside shield -->
  <rect x="58" y="50" width="24" height="18" rx="3" fill="#7aa2f7" opacity="0.8"/>
  <path d="M63 50 L63 42 C63 36 77 36 77 42 L77 50"
        fill="none" stroke="#7aa2f7" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="70" cy="58" r="2.5" fill="#1a1b26"/>

  <!-- Network lines (proxy/isolation) -->
  <line x1="105" y1="35" x2="125" y2="35" stroke="#565f89" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="105" y1="55" x2="125" y2="55" stroke="#565f89" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="105" y1="75" x2="125" y2="75" stroke="#565f89" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Title -->
  <text x="135" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#c0caf5">
    Agent
  </text>
  <text x="255" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#7aa2f7">
    Zoo
  </text>

  <!-- Subtitle -->
  <text x="135" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#565f89">
    Security Harness for AI Coding Agents
  </text>

  <!-- Cage bars (zoo motif) -->
  <line x1="295" y1="15" x2="295" y2="105" stroke="#565f89" stroke-width="1" opacity="0.3"/>
  <line x1="315" y1="15" x2="315" y2="105" stroke="#565f89" stroke-width="1" opacity="0.3"/>
  <line x1="335" y1="15" x2="335" y2="105" stroke="#565f89" stroke-width="1" opacity="0.3"/>
  <line x1="355" y1="15" x2="355" y2="105" stroke="#565f89" stroke-width="1" opacity="0.3"/>
  <line x1="375" y1="15" x2="375" y2="105" stroke="#565f89" stroke-width="1" opacity="0.3"/>

  <!-- Agent icon inside cage -->
  <circle cx="335" cy="50" r="12" fill="#7aa2f7" opacity="0.15"/>
  <circle cx="335" cy="45" r="5" fill="#7aa2f7" opacity="0.5"/>
  <path d="M325 62 C325 55 345 55 345 62" fill="#7aa2f7" opacity="0.5"/>

  <!-- Blocked signal -->
  <circle cx="335" cy="85" r="6" fill="none" stroke="#f7768e" stroke-width="1.5" opacity="0.6"/>
  <line x1="331" y1="89" x2="339" y2="81" stroke="#f7768e" stroke-width="1.5" opacity="0.6"/>
</svg>
