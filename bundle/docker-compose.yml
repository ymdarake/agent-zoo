x-agent-env: &agent-env
  HTTP_PROXY: http://proxy:8080
  HTTPS_PROXY: http://proxy:8080
  NODE_EXTRA_CA_CERTS: /certs/mitmproxy-ca-cert.pem
  SSL_CERT_FILE: /certs/mitmproxy-ca-cert.pem
  GIT_SSL_CAINFO: /certs/mitmproxy-ca-cert.pem

x-agent-common: &agent-common
  depends_on:
    proxy:
      condition: service_healthy
  networks: [intnet]
  stdin_open: true
  tty: true
  entrypoint: ["/usr/local/bin/entrypoint.sh"]
  cap_drop: [ALL]

services:
  claude:
    <<: *agent-common
    profiles: ["claude"]
    build:
      context: ./container
      dockerfile: Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1001}
    environment:
      <<: *agent-env
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      AGENT_NAME: claude  # B-5: entrypoint が CLAUDE.md を /workspace に inject
    volumes:
      - ./certs:/certs:ro
      - ../:/workspace  # ADR 0002: workspace = .zoo/ の親
      - claude-auth:/home/claude/.claude
      - ./policy.toml:/harness/policy.toml:ro
      - ./inbox:/harness/inbox  # ADR 0001 (A-3) — .zoo/inbox
      - ./templates/HARNESS_RULES.md:/harness/HARNESS_RULES.md:ro

  codex:
    <<: *agent-common
    profiles: ["codex"]
    build:
      context: ./container
      dockerfile: Dockerfile.codex
      args:
        HOST_UID: ${HOST_UID:-1001}
    environment:
      <<: *agent-env
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_NAME: codex  # B-5: entrypoint が AGENTS.md を /workspace に inject
    volumes:
      - ./certs:/certs:ro
      - ../:/workspace  # ADR 0002: workspace = .zoo/ の親
      - codex-auth:/home/codex/.codex
      - ./policy.toml:/harness/policy.toml:ro
      - ./inbox:/harness/inbox  # ADR 0001 (A-3) — .zoo/inbox
      - ./templates/HARNESS_RULES.md:/harness/HARNESS_RULES.md:ro

  gemini:
    <<: *agent-common
    profiles: ["gemini"]
    build:
      context: ./container
      dockerfile: Dockerfile.gemini
      args:
        HOST_UID: ${HOST_UID:-1001}
    environment:
      <<: *agent-env
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      AGENT_NAME: gemini  # B-5: entrypoint が GEMINI.md を /workspace に inject
    volumes:
      - ./certs:/certs:ro
      - ../:/workspace  # ADR 0002: workspace = .zoo/ の親
      - gemini-auth:/home/gemini/.gemini
      - ./policy.toml:/harness/policy.toml:ro
      - ./inbox:/harness/inbox  # ADR 0001 (A-3) — .zoo/inbox
      - ./templates/HARNESS_RULES.md:/harness/HARNESS_RULES.md:ro

  # #27: cross-agent 呼び出し（claude → gemini 等）対応の統合イメージ
  # 利用例: HOST_UID=$(id -u) docker compose --profile unified up -d unified
  #         docker compose exec unified bash
  unified:
    <<: *agent-common
    profiles: ["unified"]
    build:
      context: ./container
      dockerfile: Dockerfile.unified
      args:
        HOST_UID: ${HOST_UID:-1001}
    environment:
      <<: *agent-env
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      AGENT_NAME: unified  # entrypoint が CLAUDE.md / AGENTS.md / GEMINI.md を全 inject
    volumes:
      - ./certs:/certs:ro
      - ../:/workspace  # ADR 0002: workspace = .zoo/ の親
      - unified-auth:/home/agent  # 認証 1 volume に集約
      - ./policy.toml:/harness/policy.toml:ro
      - ./inbox:/harness/inbox  # ADR 0001 (A-3) — .zoo/inbox
      - ./templates/HARNESS_RULES.md:/harness/HARNESS_RULES.md:ro

  proxy:
    # 包括レビュー M-3 (Sprint 006 PR E): mutable tag を sha256 digest で pin。
    # multi-arch manifest list (amd64 + arm64) の digest。Dependabot 自動更新。
    image: mitmproxy/mitmproxy:10@sha256:8ee7377e1dc2dd1b2a0083d9d07d6c3f1e48c69b53b39f8dd000581e72d74498
    # 包括レビュー H-3: 最小権限 hardening。
    # - user: 1000 で image の mitmproxy user に合わせる (default entrypoint が
    #   usermod/chown を要求するため、それを avoid するため entrypoint も override)
    # - cap_drop: [ALL]: mitmdump は high port (8080) のみ bind、cap 不要
    # - no-new-privileges: setuid 昇格を封じる
    # - entrypoint: [""] で docker-entrypoint.sh (usermod 要 CHOWN) を bypass、
    #   そのまま UID 1000 で mitmdump を exec
    user: "1000:1000"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    entrypoint: [""]
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    # D-2: certs/extra/bundle.pem があれば上流 TLS 検証に使う（無ければ標準 CA）
    # 包括レビュー M-6 (Sprint 006 PR D): --set body_size_limit=1m で 1MB 超の
    # body を mitmproxy レベルで OOM 保護。addon 側では Content-Length > 1MB を
    # 413 で fail-closed 遮断する 2 段防御（commit 4 で追加予定）。
    command:
      - sh
      - -c
      - |
        if [ -f /certs/extra/bundle.pem ]; then
          exec mitmdump --set body_size_limit=1m --set confdir=/certs --set ssl_verify_upstream_trusted_ca=/certs/extra/bundle.pem -s /scripts/policy_enforcer.py
        else
          exec mitmdump --set body_size_limit=1m --set confdir=/certs -s /scripts/policy_enforcer.py
        fi
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s = socket.create_connection(('localhost', 8080), timeout=2); s.close()\""]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      intnet:
        ipv4_address: 172.30.0.2
      extnet:
    volumes:
      - ./certs:/certs
      - ./addons:/scripts:ro
      - ./policy.toml:/config/policy.toml:ro
      - ./policy.runtime.toml:/config/policy.runtime.toml:ro
      - ./data:/data

  dashboard:
    build: ./dashboard
    # 包括レビュー H-3: gunicorn を host の UID で run。bind mount (./dashboard,
    # ./inbox, ./policy.runtime.toml) は host user 権限で read/write されるため
    # UID 合わせが必要。gunicorn は 8080 (high port) で bind するため cap 不要。
    user: "${HOST_UID:-1001}:${HOST_UID:-1001}"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    ports: ["127.0.0.1:8080:8080"]
    environment:
      - DB_PATH=/data/harness.db
      - POLICY_PATH=/config/policy.toml
      - PYTHONPATH=/app
    # Note: `gunicorn` を Dockerfile CMD のまま使う (production server)。
    # dev 時に Werkzeug debugger や auto reload が必要なら docker-compose.override.yml
    # で `environment: FLASK_DEBUG=1` + `command: [flask run ...]` を opt-in する。
    volumes:
      - ./dashboard:/app
      - ./data:/data:ro
      - ./policy.toml:/config/policy.toml:ro
      - ./policy.runtime.toml:/config/policy.runtime.toml
      - ./inbox:/inbox  # ADR 0001 (A-3) — .zoo/inbox writeable
      - ./addons:/app/addons:ro
    networks: [extnet]

  dns:
    # 包括レビュー M-3 (Sprint 006 PR E): mutable tag を sha256 digest で pin。
    # multi-arch manifest list (amd64 / arm64 / armv7 / ppc64le / riscv64 / s390x) の digest。
    image: coredns/coredns:1.11.4@sha256:4190b960ea90e017631e3e1a38eea28e98e057ab60d57d47b3db6e5cf77436f7
    profiles: ["strict"]
    # 包括レビュー H-3: CoreDNS image は default で UID 65532 (nonroot)。
    # port 53 < 1024 に bind するため NET_BIND_SERVICE のみ cap_add で復活。
    cap_drop: [ALL]
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    command: -conf /etc/coredns/Corefile
    networks:
      intnet:
        ipv4_address: 172.30.0.10
    volumes:
      - ./dns/Corefile:/etc/coredns/Corefile:ro

networks:
  intnet:
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24
  extnet: {}

volumes:
  claude-auth:  # OAuth認証+セッション永続化（docker compose down -v で削除）
  codex-auth:  # Codex CLI認証+設定永続化（docker compose down -v で削除）
  gemini-auth:  # Gemini CLI 認証+設定永続化（B-3）
  unified-auth:  # cross-agent 統合用、3 CLI の認証を 1 volume に集約（#27）
