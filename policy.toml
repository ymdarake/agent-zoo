[general]
log_db = "/data/harness.db"

[domains.allow]
list = ["api.anthropic.com"]

[domains.deny]
list = ["*.evil.com"]

[domains.dismissed]
# "registry.npmjs.org" = { reason = "ホスト側でnpm install済み", date = "2026-03-29" }

[rate_limits]
"api.anthropic.com" = { rpm = 30, burst = 5 }

[payload_rules]
block_patterns = [
    "rm -rf /",
    "chmod 777",
    "base64.*\\|.*curl",
]
secret_patterns = [
    "AWS_SECRET_ACCESS_KEY",
    "ANTHROPIC_API_KEY",
    "-----BEGIN.*PRIVATE KEY-----",
]

[alerts]
suspicious_tools = ["Bash"]
suspicious_args = ["~/.ssh", "~/.aws", ".env", "id_rsa"]
tool_arg_size_alert = 10000
