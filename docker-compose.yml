x-agent-env: &agent-env
  HTTP_PROXY: http://proxy:8080
  HTTPS_PROXY: http://proxy:8080
  NODE_EXTRA_CA_CERTS: /certs/mitmproxy-ca-cert.pem
  SSL_CERT_FILE: /certs/mitmproxy-ca-cert.pem
  GIT_SSL_CAINFO: /certs/mitmproxy-ca-cert.pem

x-agent-common: &agent-common
  depends_on:
    proxy:
      condition: service_healthy
  networks: [intnet]
  stdin_open: true
  tty: true
  entrypoint: ["/usr/local/bin/entrypoint.sh"]
  cap_drop: [ALL]

services:
  claude:
    <<: *agent-common
    profiles: ["claude"]
    build:
      context: ./container
      dockerfile: Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1001}
    environment:
      <<: *agent-env
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      AGENT_NAME: claude  # B-5: entrypoint が CLAUDE.md を /workspace に inject
    volumes:
      - ./certs:/certs:ro
      - ${WORKSPACE:-./workspace}:/workspace
      - claude-auth:/home/claude/.claude
      - ./policy.toml:/harness/policy.toml:ro
      - ./policy_candidate.toml:/harness/policy_candidate.toml
      - ${WORKSPACE:-./workspace}/.zoo/inbox:/harness/inbox  # ADR 0001 (A-3)
      - ./templates/HARNESS_RULES.md:/harness/HARNESS_RULES.md:ro

  codex:
    <<: *agent-common
    profiles: ["codex"]
    build:
      context: ./container
      dockerfile: Dockerfile.codex
      args:
        HOST_UID: ${HOST_UID:-1001}
    environment:
      <<: *agent-env
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_NAME: codex  # B-5: entrypoint が AGENTS.md を /workspace に inject
    volumes:
      - ./certs:/certs:ro
      - ${WORKSPACE:-./workspace}:/workspace
      - codex-auth:/home/codex/.codex
      - ./policy.toml:/harness/policy.toml:ro
      - ./policy_candidate.toml:/harness/policy_candidate.toml
      - ${WORKSPACE:-./workspace}/.zoo/inbox:/harness/inbox  # ADR 0001 (A-3)
      - ./templates/HARNESS_RULES.md:/harness/HARNESS_RULES.md:ro

  gemini:
    <<: *agent-common
    profiles: ["gemini"]
    build:
      context: ./container
      dockerfile: Dockerfile.gemini
      args:
        HOST_UID: ${HOST_UID:-1001}
    environment:
      <<: *agent-env
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      AGENT_NAME: gemini  # B-5: entrypoint が GEMINI.md を /workspace に inject
    volumes:
      - ./certs:/certs:ro
      - ${WORKSPACE:-./workspace}:/workspace
      - gemini-auth:/home/gemini/.gemini
      - ./policy.toml:/harness/policy.toml:ro
      - ./policy_candidate.toml:/harness/policy_candidate.toml
      - ${WORKSPACE:-./workspace}/.zoo/inbox:/harness/inbox  # ADR 0001 (A-3)
      - ./templates/HARNESS_RULES.md:/harness/HARNESS_RULES.md:ro

  proxy:
    image: mitmproxy/mitmproxy:10
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    # D-2: certs/extra/bundle.pem があれば上流 TLS 検証に使う（無ければ標準 CA）
    command: >
      sh -c "if [ -f /certs/extra/bundle.pem ]; then
        mitmdump --set confdir=/certs --set ssl_verify_upstream_trusted_ca=/certs/extra/bundle.pem -s /scripts/policy_enforcer.py;
      else
        mitmdump --set confdir=/certs -s /scripts/policy_enforcer.py;
      fi"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s = socket.create_connection(('localhost', 8080), timeout=2); s.close()\""]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      intnet:
        ipv4_address: 172.30.0.2
      extnet:
    volumes:
      - ./certs:/certs
      - ./addons:/scripts:ro
      - ./policy.toml:/config/policy.toml:ro
      - ./policy.runtime.toml:/config/policy.runtime.toml:ro
      - ./data:/data

  dashboard:
    build: ./dashboard
    ports: ["127.0.0.1:8080:8080"]
    environment:
      - DB_PATH=/data/harness.db
      - POLICY_PATH=/config/policy.toml
      - PYTHONPATH=/app
      - FLASK_DEBUG=1
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0", "--port=8080"]
    volumes:
      - ./dashboard:/app
      - ./data:/data:ro
      - ./policy.toml:/config/policy.toml:ro
      - ./policy.runtime.toml:/config/policy.runtime.toml
      - ${WORKSPACE:-./workspace}/.zoo/inbox:/inbox  # ADR 0001 (A-3, writeable)
      - ./addons:/app/addons:ro
    networks: [extnet]

  dns:
    image: coredns/coredns:1.11.4
    profiles: ["strict"]
    command: -conf /etc/coredns/Corefile
    networks:
      intnet:
        ipv4_address: 172.30.0.10
    volumes:
      - ./dns/Corefile:/etc/coredns/Corefile:ro

networks:
  intnet:
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24
  extnet: {}

volumes:
  claude-auth:  # OAuth認証+セッション永続化（docker compose down -v で削除）
  codex-auth:  # Codex CLI認証+設定永続化（docker compose down -v で削除）
  gemini-auth:  # Gemini CLI 認証+設定永続化（B-3）
